<!DOCTYPE html>
<html>

<head>
    <title>AI Speech Dictation Engine</title>

    <link rel="stylesheet" href="/static/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <h1>🎤 AI Speech Dictation Engine</h1>

        <a href="/history">
            <button class="history-btn">History</button>
        </a>
    </header>


    <main class="app-container">

        <!-- CONTROLS -->
        <div class="controls">

            <button onclick="startDictation()" class="start-btn">
                🎤 Start Recording
            </button>

            <button onclick="stopDictation()" class="stop-btn">
                ⛔ Stop
            </button>

        </div>


        <!-- LIVE TRANSCRIPT -->
        <section class="card">

            <h3>Live Transcript</h3>

            <div class="mic-area">
                <div class="wave"></div>
                <div class="mic-icon" id="micIcon">🎤</div>
                <div class="wave"></div>
            </div>

            <p id="listeningIndicator" class="listening">
                🎧 Listening...
            </p>

            <textarea id="liveText" placeholder="Start speaking and your speech will appear here..."></textarea>

        </section>
        <div class="card">

            <h3>Select Tone</h3>

            <select id="toneSelect">

                <option value="formal">Formal</option>
                <option value="casual">Casual</option>
                <option value="neutral">Neutral</option>
                <option value="concise">Concise</option>
                <option value="professional">Professional</option>
                <option value="email">Email Style</option>

            </select>

        </div>

        <!-- CLEAN OUTPUT -->
        <section class="card">

            <h3>Clean Output</h3>

            <div class="output" id="cleanOutput"></div>

        </section>


        <!-- FILE UPLOAD -->
        <section class="card">

            <h3>Upload Audio File</h3>

            <form action="/upload" method="post" enctype="multipart/form-data">

                <input type="file" name="audio" required>

                <button class="upload-btn">
                    Upload & Convert
                </button>

            </form>

        </section>

    </main>

    <script src="/static/live.js"></script>

</body>

</html>
